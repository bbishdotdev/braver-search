name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-swift:
    name: Swift Tests
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Select iOS Simulator
      id: ios-simulator
      run: |
        SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
        SIMULATOR_NAME=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $1; exit }' | xargs)

        if [ -z "$SIMULATOR_ID" ]; then
          echo "No available iPhone simulators found on the runner."
          xcrun simctl list devices available
          exit 1
        fi

        echo "Using simulator: $SIMULATOR_NAME ($SIMULATOR_ID)"
        echo "device_id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
      
    - name: Build and Test iOS
      run: |
        cd "Braver Search"
        xcodebuild test \
          -project "Braver Search.xcodeproj" \
          -scheme "Braver Search (iOS)" \
          -destination "id=${{ steps.ios-simulator.outputs.device_id }}" \
          -enableCodeCoverage YES
          
    - name: Build and Test macOS
      run: |
        cd "Braver Search"
        xcodebuild test \
          -project "Braver Search.xcodeproj" \
          -scheme "Braver Search (macOS)" \
          -destination 'platform=macOS,arch=arm64' \
          -enableCodeCoverage YES \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO
          
    - name: Upload Coverage
      uses: codecov/codecov-action@v3
      with:
        xcode: true
        
  test-javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Run Tests
      run: npm test
      
    - name: Upload Coverage
      uses: codecov/codecov-action@v3
      with:
        directory: ./coverage
